version: 0.2

phases:
  pre_build:
    commands:
      - echo Logging into Amazon ECR...
      - aws --version
      - $(aws ecr get-login-password --region eu-north-1 | docker login --username AWS --password-stdin <YOUR_ECR_URI>)
  
  build:
    commands:
      - echo Build started
      - docker build -t feedbackapp-image .
      - docker tag feedbackapp-image:latest <YOUR_ECR_URI>:latest
  
  post_build:
    commands:
      - echo Pushing image to ECR
      - docker push 428185450398.dkr.ecr.eu-north-1.amazonaws.com/feedback-app-repo:latest